name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: contracts (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ hashFiles('contracts/Cargo.lock') }}
      - name: cargo test
        run: cargo test --manifest-path contracts/Cargo.toml

  js:
    name: agent + app (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: agent runtime tests
        working-directory: agent/x402-demo
        run: npm install && npm test
      - name: app tests
        working-directory: app
        run: npm install && npm test

  mcp:
    name: mcp server (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install deps
        working-directory: agent/mcp-server
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest
        working-directory: agent/mcp-server
        run: python -m pytest tests/ -q
