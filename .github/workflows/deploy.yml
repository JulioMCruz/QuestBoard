name: deploy

# Auto-deploy the web app (app/) to Vercel production on every push to main.
# Setup: add a VERCEL_TOKEN secret (repo Settings → Secrets and variables →
# Actions). Org/Project IDs below are not secret. Until the token is added the
# job skips cleanly (no red X). Root Directory = app is honoured via vercel pull.

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  vercel-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_JtCEBr1RZfFa6X4NW49vnkmO
      VERCEL_PROJECT_ID: prj_Rm8cYO1EFUvuTu3fGEwqHQY5oBpm
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret not set — skipping deploy. Add it in repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
